<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pagamento confirmado — InterviewAI Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090909; color: #e2e2e2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #111; border: 1px solid #252525; border-radius: 14px; padding: 40px; max-width: 480px; width: 100%; margin: 20px; text-align: center; }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 14px; color: #777; line-height: 1.7; margin-bottom: 20px; }
    a { display: inline-block; background: #4f8ef7; color: #fff; padding: 12px 28px; border-radius: 9px; text-decoration: none; font-size: 14px; font-weight: 700; transition: background .15s; }
    a:hover { background: #3d7de0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>Pagamento confirmado!</h1>
    <p>Sua licença foi criada e será enviada para o seu email em alguns minutos.<br><br>
       Acesse o app com a chave de licença recebida no email.</p>
    <a href="app.html">Ir para o app →</a>
  </div>
</body>
</html>
